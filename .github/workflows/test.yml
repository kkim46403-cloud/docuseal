import requests
import pandas as pd
from binance.client import Client
import ta

# ====== 👉 本地测试用（可以写死）======
TELEGRAM_TOKEN = "8742865340:AAH9O5-qJrXGKe-aHsWXQ1ikkxNJu8O_FHE"
CHAT_ID = "6764288383"

# ====== 初始化 ======
client = Client()  # 不用API key

def send(msg):
    url = f"https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage"
    try:
        r = requests.post(url, data={"chat_id": CHAT_ID, "text": msg})
        print("发送状态:", r.status_code)
        print("返回:", r.text)
    except Exception as e:
        print("Telegram错误:", e)

def get_data(symbol):
    klines = client.get_klines(symbol=symbol, interval="5m", limit=50)
    df = pd.DataFrame(klines, columns=[
        'time','open','high','low','close','volume',
        'close_time','qav','trades','tbbav','tbqav','ignore'
    ])
    df['close'] = df['close'].astype(float)
    return df

def analyze(symbol):
    try:
        df = get_data(symbol)

        # 指标
        df['rsi'] = ta.momentum.RSIIndicator(df['close']).rsi()
        price = df.iloc[-1]['close']
        rsi = round(df.iloc[-1]['rsi'], 2)

        msg = f"""
📊 {symbol}
价格: {price}
RSI: {rsi}
"""

        return msg

    except Exception as e:
        return f"{symbol} 出错: {str(e)}"

def main():
    print("程序启动...")

    messages = []

    for symbol in ["BTCUSDT", "ETHUSDT"]:
        msg = analyze(symbol)
        messages.append(msg)

    final_msg = "\n\n".join(messages)

    print(final_msg)  # 控制台也打印
    send(final_msg)

if __name__ == "__main__":
    main()